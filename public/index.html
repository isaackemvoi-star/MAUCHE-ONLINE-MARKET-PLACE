<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Marketplace</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
/>

</head>
<body>

<header class="header">

<div class="logo">
MarketPlace
</div>

<nav class="navbar">
<a href="#">Home</a>
<a href="#products">Products</a>
</nav>

<div class="header-icons">

<div class="search-box">

<input
type="text"
placeholder="Search products"
>

<button>
<i class="fas fa-search"></i>
</button>

</div>

<div class="auth-buttons">

<button id="openLogin">
Login
</button>

<button id="openSignup">
Signup
</button>

</div>

<div class="cart-icon">

<i class="fas fa-shopping-cart"></i>

<span>0</span>

</div>

</div>

</header>

<section class="hero">

<div class="hero-text">

<h1>
Buy & Sell Online
</h1>

<p>
Discover amazing products from trusted sellers.
</p>

<button>
Shop Now
</button>

</div>

<div class="hero-image">

<img
src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=1000"
>

</div>

</section>

<section class="add-product">

<h2>Add Product</h2>

<form id="productForm">

<input
type="text"
id="name"
placeholder="Product Name"
required
>

<input
type="number"
id="price"
placeholder="Product Price"
required
>

<input
type="text"
id="image"
placeholder="Image URL"
required
>

<button type="submit">
Upload Product
</button>

</form>

</section>

<main class="products" id="products">

<h2>Featured Products</h2>

<div class="product-grid"></div>

</main>

<div class="auth-modal" id="authModal">

<div class="auth-box">

<span class="close-modal" id="closeModal">
&times;
</span>

<form id="loginForm" class="auth-form">

<h2>Login</h2>

<input
type="email"
id="loginEmail"
placeholder="Email"
required
>

<input
type="password"
id="loginPassword"
placeholder="Password"
required
>

<button type="submit">
Login
</button>

</form>

<form
id="signupForm"
class="auth-form hidden"
>

<h2>Create Account</h2>

<input
type="text"
id="signupUsername"
placeholder="Username"
required
>

<input
type="email"
id="signupEmail"
placeholder="Email"
required
>

<input
type="password"
id="signupPassword"
placeholder="Password"
required
>

<button type="submit">
Signup
</button>

</form>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
